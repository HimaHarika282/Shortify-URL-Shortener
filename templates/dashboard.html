<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Shortify</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fb;
}

.hero {
    position: relative;
    text-align: center;
    margin-top: 40px;
    margin-bottom: 20px;
}

.brand-title {
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(90deg, #2563eb, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.logout-btn {
    position: absolute;
    right: 40px;
    top: 10px;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    padding: 10px 18px;
    cursor: pointer;
}

.container {
    width: 92%;
    margin: 30px auto;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.input-group {
    display: flex;
    gap: 10px;
}

input, select {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    background: #2563eb;
    color: white;
    border: none;
}

.copy { background: #22c55e; }
.delete { background: #ef4444; }

.actions {
    display: flex;
    gap: 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

.badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.active { background: #dcfce7; color: #166534; }
.expired { background: #fee2e2; color: #991b1b; }

.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #111;
    color: white;
    padding: 10px 16px;
    border-radius: 6px;
    opacity: 0;
    transition: 0.3s;
}

.stats {
    display: flex;
    gap: 20px;
}

.stat-card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<div class="hero">
    <h1 class="brand-title">Shortify</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">
    <h3>Create Short URL</h3>

    <div class="input-group">
        <input id="url" placeholder="Enter URL">
        <input id="customAlias" placeholder="Custom alias (optional)">
        <select id="expiryType">
            <option value="minutes">Minutes</option>
            <option value="days">Days</option>
        </select>
        <input id="expiryValue" placeholder="Expiry">
        <button id="shortenBtn" onclick="shorten(event)">Shorten</button>
    </div>
</div>

<div class="stats">
    <div class="stat-card">
        <h4>Total URLs</h4>
        <p id="totalUrls">0</p>
    </div>
    <div class="stat-card">
        <h4>Total Clicks</h4>
        <p id="totalClicks">0</p>
    </div>
    <div class="stat-card">
        <h4>Recent URL</h4>
        <p id="recentUrl">-</p>
    </div>
</div>

<div class="card">
    <h3>Click Analytics</h3>
    <canvas id="clickChart"></canvas>
</div>

<div class="card">
    <h3>Your URLs</h3>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Original</th>
                <th>Short</th>
                <th>Clicks</th>
                <th>Created</th>
                <th>Expiry</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

</div>

<script>

function showToast(msg){
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.opacity = "1";
    setTimeout(()=> t.style.opacity = "0", 2000);
}

function formatDate(dt){
    if(!dt) return "No Expiry";
    return new Date(dt + "Z").toLocaleString();
}

function getStatus(expiry){
    if(!expiry) return {text:"No Expiry", class:"active"};

    const e = new Date(expiry + "Z");
    if(e <= new Date()) return {text:"Expired", class:"expired"};

    return {text:"Expires at: " + e.toLocaleString(), class:"active"};
}

async function shorten(e){
    const btn = document.getElementById("shortenBtn");

    const url = document.getElementById("url").value.trim();
    const alias = document.getElementById("customAlias").value.trim();
    const type = document.getElementById("expiryType").value;
    const value = document.getElementById("expiryValue").value;

    if(!url){
        showToast("URL required");
        return;
    }

    if(!url.startsWith("http")){
        showToast("Include http/https");
        return;
    }

    if(alias && !/^[a-zA-Z0-9_-]+$/.test(alias)){
        showToast("Invalid alias");
        return;
    }

    let body = { url };

    if(alias) body.custom_alias = alias;
    if(value){
        if(type==="minutes") body.expiry_minutes = parseInt(value);
        else body.expiry_days = parseInt(value);
    }

    btn.innerText = "Creating...";
    btn.disabled = true;

    const res = await fetch("/shorten", {
        method:"POST",
        credentials:"include",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(body)
    });

    const data = await res.json();

    btn.innerText = "Shorten";
    btn.disabled = false;

    if(!res.ok){
        showToast(data.error || "Error");
        return;
    }

    showToast("Short URL created!");

    document.getElementById("url").value="";
    document.getElementById("customAlias").value="";
    document.getElementById("expiryValue").value="";

    loadTable();
    loadAnalytics();
}

async function loadTable(){
    const res = await fetch("/myurls", {credentials:"include"});
    const data = await res.json();

    if(data.length===0){
        document.getElementById("tableBody").innerHTML =
        `<tr><td colspan="8" style="text-align:center;">No URLs yet 🚀</td></tr>`;
        return;
    }

    let html="";
    let i=1;

    for(let item of data){
        const link = `${window.location.origin}/${item.code}`;
        const status = getStatus(item.expiry);

        const original = item.original.length>40
            ? item.original.slice(0,40)+"..."
            : item.original;

        html+=`
        <tr>
            <td>${i++}</td>
            <td>${original}</td>
            <td><a href="${link}" target="_blank">${link}</a></td>
            <td>${item.clicks}</td>
            <td>${formatDate(item.created)}</td>
            <td>${formatDate(item.expiry)}</td>
            <td><span class="badge ${status.class}">${status.text}</span></td>
            <td>
                <div class="actions">
                    <button class="copy" onclick="copy('${link}')">Copy</button>
                    <button class="delete" onclick="del('${item.code}')">Delete</button>
                </div>
            </td>
        </tr>`;
    }

    document.getElementById("tableBody").innerHTML = html;
}

async function del(code){
    if(!confirm("Delete this URL?")) return;

    await fetch(`/delete/${code}`, {
        method:"DELETE",
        credentials:"include"
    });

    showToast("Deleted");
    loadTable();
    loadAnalytics();
}

function copy(link){
    navigator.clipboard.writeText(link)
        .then(()=> showToast("Copied!"))
        .catch(()=> showToast("Copy failed"));
}

async function logout(){
    await fetch("/logout",{credentials:"include"});
    window.location.href="/login";
}

let chart;

function renderChart(d,c){
    if(chart) chart.destroy();

    chart=new Chart(document.getElementById("clickChart"),{
        type:'line',
        data:{
            labels:d,
            datasets:[{
                label:'Clicks',
                data:c,
                borderColor:'#2563eb',
                fill:true
            }]
        }
    });
}

async function loadAnalytics(){
    const res = await fetch("/analytics",{credentials:"include"});
    if(!res.ok) return;

    const data = await res.json();

    document.getElementById("totalUrls").innerText = data.total_urls;
    document.getElementById("totalClicks").innerText = data.total_clicks;

    const recent = document.getElementById("recentUrl");

    if(data.recent_url){
        recent.innerHTML =
        `<a href="${data.recent_url}" target="_blank">${data.recent_url.slice(0,40)}</a>`;
    } else {
        recent.innerText = "-";
    }

    renderChart(data.dates, data.counts);
}

window.onload=()=>{
    loadTable();
    loadAnalytics();
};

</script>

</body>
</html>
