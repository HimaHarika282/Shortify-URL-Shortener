<!DOCTYPE html>
<html>
<head>
<title>Redirecting - Shortify</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2 {
    margin-bottom: 10px;
}

.url {
    color: #2563eb;
    word-break: break-all;
    margin: 10px 0;
}

button {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="card">
    <h2>Redirecting...</h2>

    <p>You are going to:</p>
    <p class="url">{{ url }}</p>

    <p>Redirecting in <span id="count">3</span> seconds</p>

    <button onclick="goNow()">Go Now</button>
</div>

<script>
let count = 3;

const interval = setInterval(() => {
    count--;
    document.getElementById("count").innerText = count;

    if(count === 0){
        clearInterval(interval);
        window.location.href = "{{ url }}";
    }
}, 1000);

function goNow(){
    window.location.href = "{{ url }}";
}
</script>

</body>
</html>
